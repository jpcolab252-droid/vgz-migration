name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build
        run: gcloud builds submit --tag gcr.io/vgz-migration/vgz-migration-review --project vgz-migration
        working-directory: vgz-migration

      - name: Deploy
        run: |
          gcloud run deploy vgz-migration-review \
            --image gcr.io/vgz-migration/vgz-migration-review \
            --region europe-west1 \
            --allow-unauthenticated \
            --project vgz-migration
